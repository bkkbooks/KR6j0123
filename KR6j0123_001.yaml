body:
  text: 夫欲修習一字頂輪王法者先須入大曼荼羅海會從師親受灌頂既蒙印可方得咨學微妙軌則真言教門建立道場一依本部儀式畫本尊像如法安置若欲疾成悉地先須沐浴著新淨衣若出家者精持律儀不得缺犯若在家者應受近住八支淨戒復當殷重發廣大心於阿闍梨所敬仰如佛愍諸有情起大悲願不惜身命常生濟度悉令離苦獲大利樂入道場已五輪投地虔誠普禮一切如來復對本尊恆沙聖衆以淨三業悔除罪障勸請諸佛轉妙法輪隨喜三乘所修福智以斯妙善回向菩提法界衆生同階佛果次以塗香塗手合掌如蓮觀察本源自性清淨為諸客塵之所覆蔽作此觀已運心廣布我與衆生亦同清淨為令清淨故誦此殊勝浴澡真言唵一薩嚩二合婆去嚩秫詩律反度唅由三誦明故身口意三業乃至遍法界一切悉清淨次結一切諸佛部心三昧耶印止觀十度內叉拳禪智二度並申合遍觀諸佛滿虛空三誦真言頂上散諸佛部心真言曰唵一爾曩爾迦半字呼娑嚩二合賀引由結前印誦真言故十方諸佛一切如來承本誓願皆悉運集遍滿虛空舒光照燭加持行人離諸障惱三業清淨速證菩提次結一切諸菩薩蓮華部心三昧耶印準前結佛部心印屈左智度入掌中禪度直竪或三招運心憶念觀自在一切微塵菩薩衆持蓮眷屬滿空中至心三遍誦真言方以印於頂右散蓮華部心真言曰唵阿去嚕力迦半字呼娑嚩二合引賀由結前印誦真言故觀自在菩薩承本誓願將諸蓮華衆無量菩薩遍滿虛空皆悉運集放大光明加持行者令得清淨所求滿足離諸障難疾證菩提次結一切金剛部心三昧耶印準前復結佛部心印屈右禪度入掌中智度直竪或三招塵沙眷屬共圍繞威光赫奕遍虛空至誠三遍誦真言方以印於頂左散金剛部心真言曰唵嚩日羅二合地力二合迦半字呼娑縛二合賀引由結前印誦真言故十方一切金剛手等承本願因如雲而集現大威德加持行人除障摧魔自在無礙疾成悉地速至菩提次結金剛甲胄護身印止觀羽作金剛拳禪智橫屈於掌內進力如鉤慣甲勢加持心額二肩喉至心三遍誦真言印身五處頂上散甲胄護身真言曰唵𭊘入嚩攞二合𤙖由結甲印誦真言故加持五處成大護身即同金剛堅固之體金剛藏王承本願力領諸眷屬數如塵沙無量金剛圍繞侍從光明熾盛現忿怒形加持行人威德自在辟除作障摧壞諸魔小則能護一身大則護持國界一切災厄水火刀兵毒藥蠱虎狼猛獸皆悉遠離不敢視之毗那藥迦自然怖走永無惱害疾證菩提次結辨事印止觀二羽內叉拳禪智雙屈入掌中然申忍願頭相跓頂上三旋成結護左轉三匝是辟除隨心所到作方隅破法能成一切事辦事佛頂真言曰曩莫三去漫多母馱南引唵拏嚕唵二合滿馱娑嚩二合賀由結前印及誦真言悉能辟除及結護界是名諸佛警悟聖心能破他法壞滅魔羅天龍八部羅剎藥叉毗那夜迦忙怖奔走由結此印世出世間一切事業速能成辦自在無礙悉地現前次結奉獻閼伽印二羽仰掌捨器形進力屈於忍願傍禪智曲補於進力捧器三旋當額上想浴聖衆淨如蓮閼伽浴聖真言曰曩麼三去滿多母馱南引誐誐曩糝魔沙麼娑嚩二合引賀由結此印誦真言奉獻閼伽浴聖故表修行人無始垢業蕩除清淨如妙蓮華當來果獲得無染智次結虛空普供印二羽合掌交初分右押左縛如金剛想成真實微妙供無量雲海奉聖衆供養一切諸如來後説四句妙伽他五誦真言頂上散虛空大明真言曰曩莫三滿多沒馱南引薩嚩二合他引欠盟娜孽帝薩頗二合囉呬𤚥誐誐曩劍娑嚩二合引賀由結此印誦真言故以不思議力從印流出一切供養無量天衆各持天寶器盛諸妙供養塞滿虛空所謂塗香燒燈飲食衣服幢蓋瓔珞奉獻如來誦一遍故流出塗香當來獲得戒品塗香誦二遍故流出焚香當來獲得定芬馥誦三遍故流出花鬘當來獲得離染妙蓮誦四遍故流出寶食當來獲得法喜禪悅誦五遍故流出寶燈當來獲得如來五眼當得如上諸功德波羅蜜門皆具足復以心遍法界以誠實言誦妙伽他而説偈言以我功德力如來加持力及以法界力普供養而住次以梵讚歌詠本尊相好金身殊勝功德麼禰史膩薩嚩若誐一地帶史膩拽捨枲嚩二合𩕳二步嘌步晚禰迦滿馱三三麼娑多二合尾儞也二合地跛四訖羅二合麼哩𩕳曩謨窣覩二合帝怛囉二合哆哩左訖羅二合嚩轉舌底𩕳六由讚佛三身六根諸功德八萬四千種殊勝不思議承斯歌詠因當來獲妙果福聚海無量等同奇特尊次結佛眼大明印止觀虛合未開敷禪智雙屈在掌中進力各押忍願背如眼開明照一切安眉心額二肩喉起大悲愍怖畏除隨誦真言頂上散佛眼大明母真言曰曩莫薩嚩怛他去引蘗帝毗庾引一囉褐二合二毗藥二合三藐三沒弟毗藥二合三唵四嚕嚕窣普嚕二合入嚩攞底丁以反瑟姹二合六悉馱路引左𩕳薩嚩二合𡃤他二合去聲呼娑去馱𩕳八娑嚩二合引賀此名一切佛眼大明能息可畏難調伏者為欲成就世間出世間一切佛頂大輪王法一切事位滅諸諍論亦是一切諸佛種族母復是一切諸大菩薩生養母為説頂輪真言威德奇特諸大菩薩皆失本心諸天龍神威力滅沒凡誦一字佛頂明先須誦佛眼明念誦畢已亦誦七遍衆聖歡喜安樂有情次結一字根本印止觀密縛內叉拳由戚忍願如劍形禪智進力甲柱跓是名金剛佛頂印想身威德同本尊流光晃曜遍十方印身五處頂上散金輪頂王真言曰曩謨三漫多一母馱南二唵𤙖𭊘𡄦二合彈舌重呼𤙖此是摩訶印所謂如來頂由斯結誦故即同於世尊演説頂輪明三千六反動山河皆勇沸大火遍魔宮惶怖盡歸依地獄衆苦息菩薩龍天衆畏仰如佛身次結大慈普護印十度相叉作月形禪智檀惠相著印心額喉頂上散慈護真言曰唵沒馱昧怛哩二合嚩日囉二合洛乞灑二合憾結印誦明除怖畏起大悲心遍一切所有怨敵惡相淩願彼皆當大安樂由此三誦悲護故毒害之心自覺悟深生悔過向菩提歡喜敬仰前人所初後若常誦此明惶怖衆生得安慰護大利益殊勝事速滿諸願證悉地次結淨珠印盤珠於掌內如蓮未開形捧合於心上三七遍加持頂戴殷重心如法而供養淨珠真言曰唵阿𠺶𭊘二合引帝𠳿惹曳而異反悉地引悉馱𡃤二合剃娑嚩二合引賀次結持數印二羽半金剛禪智捻戒方進力忍願後屈不相著七遍持數明然後而念誦持珠真言曰曩莫婆誐嚩帝蘇悉地娑馱也娑馱也娑馱囉剃娑嚩二合引賀先當淨三業加法而念誦一心莫散亂注想於本尊字句分明呼不緩亦不急勿生懈怠意聲咳及頻申雜染縱惛沈如是諸過咎少分生忘緣皆不得成就念誦課數畢持珠安舊處方入三昧耶當住本尊觀食頃從定出却結根本印次結佛眼明歌詠音讚歎普供閼伽已辟除左解散三部重護身最後慈護印禮悔依前儀讀誦大乘典隨意任經行常時莫間斷奇特最勝金輪佛頂念誦儀軌法要若不能誦向前大佛眼真言誦此心真言亦得佛眼小呪也曩莫三滿多沒馱引喃引唵沒馱引路左𩕳引􅁥娑嚩二合引賀教舜二交了水壇法取新淨牛糞不食糟豆特犢子糞最第一不得直用其生牛糞取新瓦罐以汲淨水不用殘水寫淨𭂭中以糞和水攪去其滓著檀香末取一柳枝以右手執左手執金剛杵及其數珠東坐誦佛頂心呪柳枝攪水呪一百八遍持呪水器入道場中從東北角捕其香水以右手摩地隨日轉摩隨摩隨乾勿令停水道場內地一編摩訖乃至道場水四邊摩各一步地四角竪標結繩為界此則名為佛頂三昧陀羅尼結界之地如一編摩第二第三亦如是摩摩地不得用殘香水日日別取新淨牛糞準前作用作此水者則名佛頂三昧陀羅尼八功德水壇地乾竟二校了
